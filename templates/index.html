<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="Accords">
  <meta name="theme-color" content="#1E1E2E">
  <link rel="manifest" href="/static/manifest.json">
  <link rel="apple-touch-icon" href="/static/icon-192.png">
  <title>Détecteur d'Accords</title>
  <link rel="stylesheet" href="/static/style.css">
</head>
<body>

<div id="app">

  <!-- ════════════════════════ ÉCRAN UPLOAD ════════════════════════ -->
  <section id="screen-upload" class="screen active">
    <div class="upload-center">
      <div class="app-logo">🎵</div>
      <h1 class="app-title">Détecteur<br>d'Accords</h1>
      <p class="app-subtitle">Analysez les accords de n'importe quelle chanson</p>

      <label class="btn-upload" for="file-input">
        <span class="btn-icon">📂</span>
        Choisir un fichier audio
      </label>
      <input type="file" id="file-input" accept=".mp3,.wav,.flac,.ogg,.m4a,.aac" style="display:none">

      <p class="format-hint">MP3 · WAV · FLAC · OGG · M4A · AAC</p>
    </div>
  </section>

  <!-- ════════════════════════ ÉCRAN CHARGEMENT ════════════════════ -->
  <section id="screen-loading" class="screen">
    <div class="loading-center">
      <div class="spinner"></div>
      <p class="loading-title">Analyse en cours…</p>
      <p class="loading-sub">Détection des accords + tonalité</p>
      <p id="loading-filename" class="loading-file"></p>
    </div>
  </section>

  <!-- ════════════════════════ ÉCRAN RÉSULTATS ════════════════════ -->
  <section id="screen-results" class="screen">

    <!-- En-tête résultats -->
    <header class="results-header">
      <button id="btn-back" class="btn-icon-only" title="Nouvelle analyse">←</button>
      <div class="header-info">
        <span id="info-key" class="badge-key"></span>
        <span id="info-tempo" class="badge-tempo"></span>
      </div>
      <div class="header-transpose">
        <button id="btn-tr-down" class="btn-small">−♭</button>
        <span id="tr-label" class="tr-label">±0</span>
        <button id="btn-tr-up" class="btn-small">+♯</button>
      </div>
    </header>

    <!-- Accord courant (gros) -->
    <div id="current-chord-box" class="current-chord-box">
      <div id="current-chord" class="current-chord">—</div>
      <div id="current-type" class="current-type"></div>
    </div>

    <!-- Piano 88 touches -->
    <div class="piano-wrap">
      <div class="piano-labels">
        <span class="piano-label-lh">Main gauche</span>
        <span class="piano-label-rh">Main droite</span>
      </div>
      <canvas id="piano-canvas" class="piano-canvas"></canvas>
    </div>

    <!-- Diagramme guitare -->
    <div id="guitar-wrap" class="guitar-wrap">
      <svg id="guitar-svg" class="guitar-svg" viewBox="0 0 120 160" xmlns="http://www.w3.org/2000/svg"></svg>
      <div id="guitar-label" class="guitar-label"></div>
    </div>

    <!-- Lecteur audio -->
    <div class="player-bar">
      <button id="btn-play" class="btn-play" aria-label="Lecture/Pause">▶</button>
      <span id="time-current" class="time-label">0:00</span>
      <input type="range" id="seek-bar" class="seek-bar" min="0" max="100" value="0" step="0.1">
      <span id="time-total" class="time-label">0:00</span>
    </div>

    <!-- Grille des accords -->
    <div id="chord-list" class="chord-list"></div>

  </section>

</div><!-- #app -->

<audio id="audio-player" preload="none"></audio>

<script src="/static/piano.js"></script>
<script src="/static/guitar.js"></script>
<script src="/static/app.js"></script>
</body>
</html>

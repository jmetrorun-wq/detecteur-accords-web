services:
  - type: web
    name: detecteur-accords
    env: python
    buildCommand: pip install -r requirements.txt && python -c "import librosa.util.utils; print('numba guvectorize cache ok')"
    startCommand: gunicorn app:app --bind 0.0.0.0:$PORT --workers 1 --timeout 180
    plan: free
    envVars:
      - key: NUMBA_DISABLE_JIT
        value: "1"
